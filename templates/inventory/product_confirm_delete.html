{% extends 'base.html' %}
{% block page_title %}Delete Product{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
            <h6 class="fw-semibold">Delete "{{ product.name }}"?</h6>
            <p class="text-muted small">This action cannot be undone. All related sales and forecasts will also be deleted.</p>
            <form method="post" class="d-flex gap-2 justify-content-center mt-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'product_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
