{% extends 'base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #1a1a2e, #16213e);">
    <div class="card p-4" style="width: 420px;">
        <div class="text-center mb-4">
            <i class="bi bi-boxes fs-1 text-danger"></i>
            <h5 class="fw-bold mt-2">Create Account</h5>
        </div>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label small fw-semibold">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-danger w-100">Register</button>
        </form>
        <p class="text-center mt-3 small">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
</div>
{% endblock %}
